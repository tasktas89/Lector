<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Editor</title>
    <meta name="theme-color" content="#1e293b">
    
    <link id="pwa-manifest" rel="manifest" href="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        darkbg: '#0f172a', 
                        darkpanel: '#1e293b', 
                        darkbtn: '#334155', 
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .no-scrollbar::-webkit-scrollbar { display: none; }
            .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            .sync-line-height { line-height: 1.5rem; font-size: 0.875rem; }
            .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
            .custom-scrollbar::-webkit-scrollbar-track { @apply bg-transparent; }
            .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-gray-300 dark:bg-slate-600 rounded-lg border-2 border-solid border-transparent bg-clip-padding; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { @apply bg-gray-400 dark:bg-slate-500; }
        }
        select option {
            @apply bg-white dark:bg-slate-800 text-gray-800 dark:text-slate-100;
        }
    </style>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body x-data="editorApp()" 
      :class="{ 'dark': isDark }" 
      class="h-screen w-full flex flex-col bg-gray-50 dark:bg-darkbg text-gray-800 dark:text-slate-100 transition-colors duration-200 overflow-hidden selection:bg-blue-200 dark:selection:bg-blue-900">

    <header class="flex-none flex items-center justify-between px-3 py-2 bg-white dark:bg-darkpanel border-b border-gray-200 dark:border-slate-700 z-20">
        
        <div class="flex flex-1 max-w-md items-center bg-gray-100 dark:bg-slate-900 rounded-md border border-gray-300 dark:border-slate-600 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 overflow-hidden transition-all shadow-inner relative">
            <div class="px-2 py-1.5 bg-blue-600 text-white flex-none">
                <i data-lucide="terminal" class="w-4 h-4"></i>
            </div>
            
            <input type="text" x-model="fileName" class="flex-1 bg-transparent border-none py-1.5 px-2 text-sm focus:outline-none text-gray-800 dark:text-slate-100 placeholder-gray-400 dark:placeholder-slate-500 min-w-[80px]" placeholder="documento">
            
            <div class="w-px h-5 bg-gray-300 dark:bg-slate-600 flex-none"></div>
            
            <select x-show="!isAddingExt" x-model="fileFormat" @change="handleExtChange" class="w-20 sm:w-24 bg-transparent border-none py-1.5 px-1 text-sm focus:outline-none text-gray-800 dark:text-slate-100 font-mono text-center flex-none cursor-pointer outline-none">
                <template x-for="ext in extensions" :key="ext">
                    <option :value="ext" x-text="ext"></option>
                </template>
                <option disabled>──────────</option>
                <option value="custom" class="font-bold text-blue-600 dark:text-blue-400">+ Añadir...</option>
            </select>

            <input x-show="isAddingExt" 
                   x-ref="newExtInput" 
                   type="text" 
                   x-model="newExtension" 
                   @blur="saveNewExt" 
                   @keyup.enter="saveNewExt" 
                   @keyup.escape="cancelNewExt"
                   class="w-20 sm:w-24 bg-blue-50 dark:bg-slate-800 border-none py-1.5 px-2 text-sm focus:outline-none text-blue-700 dark:text-blue-300 font-mono text-center flex-none placeholder-blue-300 dark:placeholder-slate-500" 
                   placeholder=".ext">
        </div>

        <div class="flex items-center gap-1 ml-2">
            <button x-show="deferredPrompt || !isLocalFile" @click="installPWA" class="p-2 text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 rounded-md hover:bg-blue-50 dark:hover:bg-slate-700 transition-colors flex-none" aria-label="Instalar Aplicación" title="Instalar Aplicación">
                <i data-lucide="download-cloud" class="w-5 h-5"></i>
            </button>
            
            <button @click="toggleTheme" class="p-2 text-gray-500 hover:text-gray-800 dark:text-slate-400 dark:hover:text-white rounded-md hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors flex-none" aria-label="Cambiar tema">
                <i :data-lucide="isDark ? 'sun' : 'moon'" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <div class="flex-none bg-gray-200 dark:bg-slate-900 border-b border-gray-300 dark:border-slate-800 p-1 z-10">
        <input type="file" x-ref="fileInput" @change="importFile" class="hidden">
        
        <div class="grid grid-cols-3 sm:grid-cols-6 gap-[2px]">
            <button @click="$refs.fileInput.click()" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-white dark:bg-darkpanel hover:bg-gray-50 dark:hover:bg-darkbtn text-gray-700 dark:text-slate-200 transition-colors rounded-tl-md sm:rounded-l-md sm:rounded-tr-none">
                <i data-lucide="folder-open" class="w-4 h-4"></i> <span>Importar</span>
            </button>
            <button @click="exportFile" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> <span>Descargar</span>
            </button>
            <button @click="saveAs" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-white dark:bg-darkpanel hover:bg-gray-50 dark:hover:bg-darkbtn text-gray-700 dark:text-slate-200 transition-colors rounded-tr-md sm:rounded-none">
                <i data-lucide="save" class="w-4 h-4"></i> <span>Guardar</span>
            </button>
            <button @click="pasteContent" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-white dark:bg-darkpanel hover:bg-gray-50 dark:hover:bg-darkbtn text-gray-700 dark:text-slate-200 transition-colors rounded-bl-md sm:rounded-none">
                <i data-lucide="clipboard-paste" class="w-4 h-4"></i> <span>Pegar</span>
            </button>
            <button @click="selectAll" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-white dark:bg-darkpanel hover:bg-gray-50 dark:hover:bg-darkbtn text-gray-700 dark:text-slate-200 transition-colors">
                <i data-lucide="mouse-pointer-2" class="w-4 h-4"></i> <span>Seleccionar</span>
            </button>
            <button @click="clearContent" class="flex flex-col sm:flex-row items-center justify-center gap-1 sm:gap-2 p-2 sm:py-1.5 text-xs font-medium bg-red-50 dark:bg-[#2d1b2e] hover:bg-red-100 dark:hover:bg-[#3d2232] text-red-600 dark:text-red-400 transition-colors rounded-br-md sm:rounded-r-md sm:rounded-bl-none">
                <i data-lucide="trash-2" class="w-4 h-4"></i> <span>Limpiar</span>
            </button>
        </div>
    </div>

    <main class="flex-1 flex min-h-0 relative bg-white dark:bg-darkbg">
        <div x-ref="lineNumbers" 
             class="flex-none w-10 sm:w-14 bg-gray-50 dark:bg-[#0b1120] border-r border-gray-200 dark:border-slate-800 text-right pr-2 py-4 select-none overflow-hidden sync-line-height font-mono text-gray-400 dark:text-slate-600">
            <div class="h-full">
                <template x-for="i in getLineCount()" :key="i">
                    <div x-text="i"></div>
                </template>
                <div class="h-8"></div> 
            </div>
        </div>

        <textarea x-ref="editor"
                  x-model="content"
                  @scroll="syncScroll"
                  @keydown.tab.prevent="insertTab"
                  wrap="off"
                  spellcheck="false"
                  class="flex-1 w-full h-full resize-none outline-none bg-transparent py-4 px-3 font-mono sync-line-height text-gray-800 dark:text-slate-200 placeholder-gray-400 dark:placeholder-slate-600 custom-scrollbar whitespace-pre"
                  placeholder="Empieza a escribir, importa o pega tu código aquí..."></textarea>
    </main>

    <footer class="flex-none flex items-center justify-between px-3 py-1.5 bg-gray-100 dark:bg-darkpanel border-t border-gray-200 dark:border-slate-700 text-xs font-mono text-gray-600 dark:text-slate-400 select-none z-10">
        <div class="flex items-center gap-3">
            <span class="truncate max-w-[120px] sm:max-w-xs font-medium text-gray-800 dark:text-slate-200" x-text="(fileName || 'sin_titulo') + (fileFormat || '')"></span>
            <span x-text="content.length + ' ch'"></span>
        </div>
        <div class="flex items-center gap-3">
            <span x-text="getLineCount() + ' ln'"></span>
            <span>UTF-8</span>
        </div>
    </footer>

    <script>
        function editorApp() {
            return {
                isDark: false,
                content: '',
                fileName: 'documento',
                fileFormat: '.txt',
                
                extensions: ['.txt', '.md', '.html', '.css', '.js', '.json', '.csv', '.py', '.xml'],
                isAddingExt: false,
                newExtension: '',

                deferredPrompt: null,
                isLocalFile: window.location.protocol === 'file:',
                
                init() {
                    this.initIcons();
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        this.isDark = true;
                    }
                    this.$watch('isDark', () => this.initIcons());
                    this.$watch('content', () => this.$nextTick(() => this.syncScroll({ target: this.$refs.editor })));
                    
                    window.addEventListener('beforeinstallprompt', (e) => {
                        e.preventDefault();
                        this.deferredPrompt = e;
                    });

                    this.setupPWA();
                },

                initIcons() {
                    setTimeout(() => lucide.createIcons(), 10);
                },

                toggleTheme() {
                    this.isDark = !this.isDark;
                },

                handleExtChange() {
                    if (this.fileFormat === 'custom') {
                        this.isAddingExt = true;
                        this.newExtension = '.';
                        this.$nextTick(() => {
                            this.$refs.newExtInput.focus();
                            this.$refs.newExtInput.selectionStart = 1;
                            this.$refs.newExtInput.selectionEnd = 1;
                        });
                    }
                },

                saveNewExt() {
                    let ext = this.newExtension.trim().toLowerCase();
                    if (ext && ext !== '.') {
                        if (!ext.startsWith('.')) ext = '.' + ext;
                        if (!this.extensions.includes(ext)) {
                            this.extensions.push(ext);
                        }
                        this.fileFormat = ext;
                    } else {
                        this.fileFormat = this.extensions[0];
                    }
                    this.isAddingExt = false;
                },

                cancelNewExt() {
                    this.fileFormat = this.extensions[0];
                    this.isAddingExt = false;
                },

                getLineCount() {
                    if (!this.content) return 1;
                    return this.content.split('\n').length;
                },

                syncScroll(e) {
                    if(this.$refs.lineNumbers) {
                        this.$refs.lineNumbers.scrollTop = e.target.scrollTop;
                    }
                },

                insertTab(e) {
                    const textarea = e.target;
                    const start = textarea.selectionStart;
                    const end = textarea.selectionEnd;
                    this.content = this.content.substring(0, start) + "    " + this.content.substring(end);
                    this.$nextTick(() => {
                        textarea.selectionStart = textarea.selectionEnd = start + 4;
                    });
                },

                importFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    const lastDot = file.name.lastIndexOf('.');
                    if (lastDot !== -1) {
                        this.fileName = file.name.substring(0, lastDot);
                        let ext = file.name.substring(lastDot).toLowerCase();
                        if (!this.extensions.includes(ext)) {
                            this.extensions.push(ext);
                        }
                        this.fileFormat = ext;
                    } else {
                        this.fileName = file.name;
                        this.fileFormat = this.extensions[0];
                    }

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        this.content = event.target.result;
                        this.$nextTick(() => {
                            this.$refs.editor.scrollTop = 0;
                            this.$refs.editor.scrollLeft = 0;
                            this.syncScroll({ target: this.$refs.editor });
                        });
                    };
                    reader.readAsText(file);
                    e.target.value = '';
                },

                exportFile() {
                    const name = this.fileName.trim() || 'documento';
                    const format = this.fileFormat.trim();
                    const fullName = format.startsWith('.') ? `${name}${format}` : (format ? `${name}.${format}` : name);
                    
                    const blob = new Blob([this.content], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fullName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                },

                saveAs() {
                    const currentFullName = this.fileName + this.fileFormat;
                    const newName = prompt('Guardar como (nombre.extension):', currentFullName);
                    if (newName !== null && newName.trim() !== '') {
                        const lastDot = newName.lastIndexOf('.');
                        if (lastDot !== -1) {
                            this.fileName = newName.substring(0, lastDot);
                            let ext = newName.substring(lastDot).toLowerCase();
                            if (!this.extensions.includes(ext)) {
                                this.extensions.push(ext);
                            }
                            this.fileFormat = ext;
                        } else {
                            this.fileName = newName;
                            this.fileFormat = '';
                        }
                        this.exportFile();
                    }
                },

                selectAll() {
                    this.$refs.editor.focus();
                    this.$refs.editor.select();
                },

                clearContent() {
                    if (this.content.length === 0 || confirm('¿Limpiar todo el contenido?')) {
                        this.content = '';
                        this.$refs.editor.focus();
                    }
                },

                async pasteContent() {
                    try {
                        const text = await navigator.clipboard.readText();
                        const textarea = this.$refs.editor;
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        
                        this.content = this.content.substring(0, start) + text + this.content.substring(end);
                        
                        this.$nextTick(() => {
                            textarea.selectionStart = textarea.selectionEnd = start + text.length;
                            textarea.focus();
                        });
                    } catch (err) {
                        alert('El navegador bloqueó el acceso al portapapeles. Usa Ctrl+V o manten pulsado para pegar.');
                    }
                },

                setupPWA() {
                    const manifest = {
                        "name": "Nexus Editor",
                        "short_name": "Nexus",
                        "description": "Lector y editor fluido",
                        "start_url": window.location.href.split('?')[0].split('#')[0],
                        "display": "standalone",
                        "background_color": "#0f172a",
                        "theme_color": "#2563eb",
                        "icons": [
                            {
                                "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzI1NjNlYiI+PHBhdGggZD0iTTIgMmg0djIwSDJ6TTE4IDJoNHYyMGgtNHoiLz48L3N2Zz4=",
                                "sizes": "512x512",
                                "type": "image/svg+xml",
                                "purpose": "any maskable"
                            }
                        ]
                    };

                    const manifestString = JSON.stringify(manifest);
                    document.getElementById('pwa-manifest').setAttribute('href', 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString));

                    if ('serviceWorker' in navigator && !this.isLocalFile) {
                        const swCode = `
                            const CACHE_NAME = 'nexus-editor-v1';
                            const APP_URL = self.location.origin + self.location.pathname.replace('blob:', '');
                            
                            self.addEventListener('install', (e) => {
                                e.waitUntil(
                                    caches.open(CACHE_NAME).then((cache) => {
                                        return cache.addAll([APP_URL]); 
                                    })
                                );
                                self.skipWaiting();
                            });

                            self.addEventListener('activate', (e) => {
                                e.waitUntil(self.clients.claim());
                            });

                            self.addEventListener('fetch', (e) => {
                                e.respondWith(
                                    caches.match(e.request).then((response) => {
                                        return response || fetch(e.request);
                                    })
                                );
                            });
                        `;
                        
                        const swBlob = new Blob([swCode], {type: 'application/javascript'});
                        navigator.serviceWorker.register(URL.createObjectURL(swBlob))
                            .then(() => console.log('Service Worker Offline registrado correctamente'))
                            .catch(err => console.warn('SW falló:', err));
                    }
                },

                async installPWA() {
                    if (this.isLocalFile) {
                        alert("Abre el archivo desde localhost (ej. 127.0.0.1:8000) para poder instalarla.");
                        return;
                    }
                    if (this.deferredPrompt) {
                        this.deferredPrompt.prompt();
                        const { outcome } = await this.deferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            this.deferredPrompt = null;
                        }
                    } else {
                        alert("Por favor, usa el menú del navegador ('Añadir a la pantalla principal') para instalar la aplicación.");
                    }
                }
            }
        }
    </script>
</body>
</html>
